# Netlify Configuration for Pride Vacations (Vite + React SPA)

[build]
  # Vite build command
  command = "npm run build"
  # Vite outputs to dist/
  publish = "dist"

# SPA fallback - redirect all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Serverless function for AI Concierge
[[redirects]]
  from = "/api/concierge"
  to = "/.netlify/functions/concierge"
  status = 200

[build.environment]
  # Node version
  NODE_VERSION = "18"

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
